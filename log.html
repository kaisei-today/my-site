<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>作品集｜勉強中</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">

<style>
body { display: flex;
    flex-direction: column; /* 上から下に並べる */
    min-height: 100vh;      /* 画面の高さ（100%）を最低限確保する */
    margin: 0; background-color: #e6fafa; text-align: center; font-family: 'Yomogi', cursive; }
      
footer {
    margin-top: auto;       /* 上側の余白を「自動」にして、一番下まで押し出す */
    padding: 20px 0 5px 0;
    font-size: 14px; }

h2 { color: #6b8e23; }

.mini-bookshelf {
    background-color: #faf0e6; /* ヘッダーと同じ色にすると馴染むよ */
    padding: 10px;
    margin-bottom: 30px;
    position: sticky; /* ★スクロールしても上についてくる魔法！ */
    top: 0;
    z-index: 100; }

.nav-link {
    margin: 0 10px;
    text-decoration: none;
    color: #000000;
    font-weight: bold;
    font-size: 16px; }

.nav-link:hover {
    color: #8d9999; /* マウスを乗せると色が変わる */ }

        /* 今いるページの文字のデザイン */
.current-page {
    color: #8d9999;    /* 好きな色に変えてね！ */
    font-weight: bold; /* 太字にする */
    cursor: default;   /* マウスを置いても「指マーク」にならないようにする */
    display: inline-block; /* ← これを入れると「文字選択」になりにくくなります */ }

.current-page:hover { color: #8d9999; }

.log-container {
    max-width: 500px; /* 日記は少し細めの方が読みやすい */
    margin: 0 auto;
    padding: 20px;
    text-align: left; }

.diary-entry {
    background-color: #ffffff;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.05); /* ほんのり影をつけて紙っぽく */
    border-left: 5px solid #ffcccc; /* 左側にアクセントカラーの線を引く */ }

.diary-date {
    font-size: 14px;
    color: #8d9999;
    font-weight: bold; }

.diary-weather {
    margin-left: 10px;
    font-size: 14px; }

.diary-content p {
    line-height: 1.8; /* 行間を広くして読みやすく */
    margin-top: 10px; }

<body>
    <h2>ほぼ日記に近いです。毎日更新するかは分かりません😉</h2>

<div class="log-container">
    <article class="diary-entry">
        <div class="diary-header">
            <span class="diary-date">2026.04.03</span>
            <span class="diary-weather">☀️</span>
        </div>
        <div class="diary-content">
            <p>昨日からちょっとずつ進めていたホームページの枠組みが完成！　ずっと作りたかったから嬉しすぎる～</p>
            <p>固定夢主くんたちの紹介ページは遅くなりそうだな…</p>
        </div>
    </article>
    </div>


<footer>
    &copy; 2026 晴凪
</footer>
</body>
</html>
