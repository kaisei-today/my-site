<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>キャラクター｜今日も一日快晴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">

<style>
body { display: flex;
    flex-direction: column; /* 上から下に並べる */
    min-height: 100vh;      /* 画面の高さ（100%）を最低限確保する */
    margin: 0; background-color: #e6fafa; text-align: center; font-family: 'Yomogi', cursive; }
      
footer {
    margin-top: auto;       /* 上側の余白を「自動」にして、一番下まで押し出す */
    padding: 20px 0 5px 0;
    font-size: 14px; }

h2 { color: #52662c; }

.mini-bookshelf {
    background-color: #faf0e6; /* ヘッダーと同じ色にすると馴染むよ */
    padding: 10px;
    margin-bottom: 30px;
    position: sticky; /* ★スクロールしても上についてくる魔法！ */
    top: 0;
    z-index: 100; }

.nav-link {
    margin: 0 10px;
    text-decoration: none;
    color: #000000;
    font-weight: bold;
    font-size: 16px; }

.nav-link:hover {
    color: #8d9999; /* マウスを乗せると色が変わる */ }

        /* 今いるページの文字のデザイン */
.current-page {
    color: #696969;    /* 好きな色に変えてね！ */
    font-weight: bold; /* 太字にする */
    cursor: default;   /* マウスを置いても「指マーク」にならないようにする */
    display: inline-block; /* ← これを入れると「文字選択」になりにくくなります */ }

.current-page:hover { color: #696969; }

/* 二次・一次のセクションを囲む箱 */
.char-section {
    max-width: 900px;
    margin: 0 auto 50px auto;
    padding: 0 20px; }

/* カードを横に並べる魔法 */
.char-grid {
    display: flex;
    flex-wrap: wrap; /* 画面幅が狭いと自動で折り返す */
    justify-content: center;
    gap: 10px; /* カード同士の隙間 */ }

/* 1人分のカード */
.char-card {
    width: 150px; /* スマホでも見やすい幅 */
    text-decoration: none; /* リンクの下線を消す */
    color: inherit;
    transition: transform 0.3s; /* 0.3秒かけて動く */ }

.char-card:hover {
    transform: translateY(-5px); /* マウスを乗せると少し浮く */ }

.char-img {
    width: 100%;
    height: 140px;
    object-fit: cover; /* 画像を枠にピッタリ合わせる */
    border-radius: 10px; /* 角を丸くする */ }

.char-name {
    margin-top: 10px;
    font-size: 15px; }
</style>
</head>

<body>
