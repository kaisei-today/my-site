<style>
        body { display: flex;
    flex-direction: column; /* 上から下に並べる */
    min-height: 100vh;      /* 画面の高さ（100%）を最低限確保する */
    margin: 0; background-color: #e6fafa; text-align: center; font-family: 'Yomogi', cursive; }
        header { 
    margin: 0;   /* 上の余白だけを 0 にする */
    padding: 40px 0; 
    margin-bottom: 30px; /* 下のコンテンツとの隙間 */
    background-color: #faf0e6; }
    
    header h1 {
    margin: 0; 
    font-size: 80px; 
    color: #8d9999; }
 
    header p {
    margin: 30px 0 0 0; 
    font-size: 20px;
    color: #8d9999; }

        h2 { 
    margin-top: 0; 
    font-size: 40px; 
    color: #52662c; /* 色を変えてみたよ */ }
      
        footer {
    margin-top: auto;       /* 上側の余白を「自動」にして、一番下まで押し出す */
    padding: 20px 0 5px 0;
    font-size: 14px; }

        .book-spine {
  display: inline-block;
  transition: 1s; /* 動きをなめらかにする */ }


/* 本棚全体の並べ方 */
        .bookshelf {
    display: flex;
    justify-content: center;
    align-items: flex-end; /* 本の「下」を揃える */
    gap: 10px;            /* 本と本の隙間 */
    margin: 50px 0;
    border-bottom: 10px solid #8b4513; /* ★8pxの太さ、一本線、茶色！ */
    padding-bottom: 0;                /* 本と板をピタッとくっつける */ 
    max-width: 600px;  /* ★棚の最大の長さを決める（お好みで調整！） */
    margin-left: auto;  /* ★左側の余白を「自動」にする */
    margin-right: auto; /* ★右側の余白を「自動」にする */ 
    border-radius: 6px; /* 板の角をほんのり丸くする */
    gap: 20px; 
    padding: 0 40px }

/* 本の背表紙のデザイン */
        .book-spine {
    display: block;
    width: 60px;          /* 本の横幅 */
    height: 200px;        /* 本の高さ（背表紙っぽく縦長に！） */
    color: #555;          /* 文字の色 */
    text-decoration: none;
    writing-mode: vertical-rl; /* ★重要：文字を「縦書き」にする魔法！ */
    display: flex;          /* 中身を自由に並べるモードにする */
    justify-content: center; /* 縦方向（縦書きなので）の中央 */
    align-items: center;     /* 横方向の中央 */
    padding: 15px 5px;
    border-radius: 5px 5px 0 0; /* 上だけ丸くして「本」っぽく */
    font-weight: bold;
    font-size: 20px;
    transition: 0.3s;
    cursor: pointer; }

         .color1 { background-color: #ffcccc; }
         .color2 { background-color: #b7b7ff; }
         .color3 { background-color: #ffccff; }
         .color4 { background-color: #98d98e; }

/* マウスを乗せた時の動き */
         .book-spine:hover {
    transform: translateY(-20px); /* ぴょこっと上に引き出す */
    filter: brightness(1.1);      /* 少し明るくする */ }

</style>
</head>

</div>
